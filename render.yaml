services:
  - type: web
    name: water-quality-backend
    env: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: water-quality-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
